name: Verify (Reusable)

on:
  workflow_call:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Browser (required for Vitest browser project)
        run: bunx playwright install --with-deps chromium

      - name: Package Quality Checks
        run: bun run check

  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Install Docs Dependencies
        run: bun install --cwd apps/docs --frozen-lockfile

      - name: Build Docs App
        run: bun run docs:build

  consumer-matrix:
    name: Consumer Matrix (${{ matrix.consumer.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        consumer:
          - name: react
            setup: demo:setup:react
            build: demo:build:react
          - name: vue
            setup: demo:setup:vue
            build: demo:build:vue
          - name: svelte
            setup: demo:setup:svelte
            build: demo:build:svelte
          - name: next
            setup: demo:setup:next
            build: demo:build:next
          - name: tanstack
            setup: demo:setup:tanstack
            build: demo:build:tanstack

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3
        with:
          bun-version: 1.3.6

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Package
        run: bun run build

      - name: Install Consumer Dependencies
        run: bun run ${{ matrix.consumer.setup }}

      - name: Build Consumer
        run: bun run ${{ matrix.consumer.build }}

      - name: Smoke Consumer
        run: DEMO_SMOKE_CONSUMER=${{ matrix.consumer.name }} bun run test:smoke

  release-candidate-gate:
    name: Release Candidate Gate
    runs-on: ubuntu-latest
    needs:
      - quality
      - docs-build
      - consumer-matrix
    steps:
      - name: Gate Passed
        run: |
          echo "Release candidate gate passed: quality + docs build + consumer matrix smoke."
