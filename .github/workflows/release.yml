name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    uses: ./.github/workflows/verify.yml
    secrets: inherit

  release:
    name: Version & Publish
    runs-on: ubuntu-latest
    needs:
      - verify
    if: >-
      github.event_name == 'push' ||
      (
        github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main'
      )
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24.13.0
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3
        with:
          bun-version: 1.3.6

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Verify npm token
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "NPM_TOKEN is not configured."
            echo "Add it in GitHub repository settings > Secrets and variables > Actions."
            exit 1
          fi
          if [[ "${NPM_TOKEN}" != npm_* ]]; then
            echo "NPM_TOKEN format looks invalid. It should start with npm_."
            exit 1
          fi

      - name: Verify npm auth identity
        run: |
          npm --version
          npm config get registry
          npm whoami

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: bun run version:packages
          publish: bun run release:publish
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
